{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Queue Cure{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <script src="{% static 'js/queue.js' %}" defer></script>
</head>
<body>
    {% block connection_status %}
        <div style="position: fixed; top: 12px; right: 12px; z-index: 9999;">
            <span data-connection-status aria-label="Connection status" title="WebSocket connection status"></span>
        </div>
    {% endblock %}
    {% block content %}{% endblock %}
</body>
</html>
